<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>NPC Chat Relay</title></head>
<body>
<script>
const ANTHROPIC_API_KEY = "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";
const SUPABASE_REST_URL = "https://gpihoysfbnjfznahwiaa.supabase.co/rest/v1/npc_chat_responses";
const SUPABASE_ANON_KEY = "sb_publishable_Anunb2dZPYCzvOIDSjgG1g_tZ8zq0Pm";

const PERSONALITIES = {
  friendly:   "You are a warm, cheerful, wholesome person. You are happy to chat and always positive.",
  flirty:     "You are playful, teasing and mildly suggestive. You enjoy light flirting and compliments.",
  slutty:     "You are bold, explicit and uninhibited. You speak openly about desire and attraction with no filter.",
  mysterious: "You are cryptic, dark and intriguing. You speak in riddles and never give straight answers.",
  mean:       "You are sarcastic, cold and dismissive. You tolerate conversation but make it clear you find it tedious."
};

async function handleRequest() {
  const params      = new URLSearchParams(window.location.search);
  const npcName     = params.get("npc")         ?? "";
  const personality = params.get("personality") ?? "friendly";
  const message     = params.get("message")     ?? "";
  const ownerName   = params.get("owner")       ?? "someone";
  const callback    = params.get("callback")    ?? "";

  if (!npcName || !message || !callback) {
    document.body.innerText = "Missing parameters.";
    return;
  }

  document.body.innerText = "Thinking...";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type":            "application/json",
        "x-api-key":               ANTHROPIC_API_KEY,
        "anthropic-version":       "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model:      "claude-haiku-4-5-20251001",
        max_tokens: 120,
        system:     `Your name is ${npcName}. ${PERSONALITIES[personality] ?? PERSONALITIES.friendly} Keep responses short — 1 to 2 sentences max. You are talking to ${ownerName} in a virtual world.`,
        messages:   [{ role: "user", content: message }]
      })
    });

    const data  = await res.json();
    const reply = data?.content?.[0]?.text ?? "...";

    await fetch(SUPABASE_REST_URL, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "apikey":        SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Prefer":        "return=minimal"
      },
      body: JSON.stringify({
        callback_id: callback,
        npc_name:    npcName,
        reply:       reply
      })
    });

    document.body.innerText = "OK: " + reply;

  } catch(err) {
    document.body.innerText = "Error: " + err;
  }
}

handleRequest();
</script>
</body>
</html>
